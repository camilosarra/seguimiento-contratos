<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Administrador</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
}

.container{
width:400px;
margin:auto;
margin-top:100px;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}

button{
background:#2c5aa0;
color:white;
border:none;
padding:10px;
width:100%;
}

.alert{
background:#ffdede;
padding:10px;
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container">

<h2>Panel Administrador</h2>

{% if error %}
<div class="alert">{{error}}</div>
{% endif %}

<form method="post">

<label>Usuario</label>
<input name="usuario">

<label>Contraseña</label>
<input type="password" name="password">

<button>Ingresar</button>

</form>

</div>

</body>
</html>
