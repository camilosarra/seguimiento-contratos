<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Seguimiento contratos</title>

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:0;
}

.header{
background:white;
padding:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
height:60px;
}

.container{
width:900px;
margin:auto;
margin-top:30px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.field{
display:flex;
flex-direction:column;
}

.field label{
font-weight:bold;
margin-bottom:5px;
}

input{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
}

textarea{
padding:10px;
border:1px solid #ddd;
border-radius:6px;
height:90px;
}

.edit{
cursor:pointer;
float:right;
}

.success{
background:#d4edda;
padding:15px;
border-radius:6px;
margin-bottom:15px;
}

button{
background:#2c5aa0;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

</style>

<script>

function editar(id){
let campo=document.getElementById(id)
campo.removeAttribute("readonly")
campo.focus()
}

</script>

</head>

<body>

<div class="header">
<img src="/static/logo_art.png" class="logo">
</div>

<div class="container">

{% if mensaje %}
<div class="success">
✔ {{mensaje}}
</div>
{% endif %}

{% if not contrato %}

<div class="card">

<form method="post" action="/buscar">

<label>Número de contrato</label>

<input name="contrato" placeholder="Ejemplo 745-2025">

<button>Buscar contrato</button>

</form>

</div>

{% endif %}

{% if contrato %}

<!-- TARJETA CONTRATO -->

<div class="card">

<h3>Datos del contrato</h3>

<div class="grid">

<div class="field">
<label>Línea de acción</label>
<input value="{{linea}}" readonly>
</div>

<div class="field">
<label>Contratista</label>
<input value="{{contratista}}" readonly>
</div>

<div class="field">
<label>Identificación contratista</label>
<input value="{{identificacion_contratista}}" readonly>
</div>

<div class="field">
<label>Contrato</label>
<input value="{{contrato}}" readonly>
</div>

<div class="field">
<label>Subcuenta</label>
<input value="{{subcuenta}}" readonly>
</div>

<div class="field">
<label>Ejecución técnica</label>
<input value="{{ejecucion}}" readonly>
</div>

<div class="field">
<label>Departamento</label>
<input value="{{departamento}}" readonly>
</div>

<div class="field">
<label>Ciudad</label>
<input value="{{ciudad}}" readonly>
</div>

</div>

</div>

<!-- TARJETA SUPERVISOR -->

<div class="card">

<h3>Datos del supervisor</h3>

<div class="grid">

<div class="field">
<label>Supervisor <span class="edit" onclick="editar('supervisor')">✏️</span></label>
<input id="supervisor" value="{{supervisor}}" readonly>
</div>

<div class="field">
<label>Cédula supervisor <span class="edit" onclick="editar('cedula')">✏️</span></label>
<input id="cedula" value="{{cedula}}" readonly>
</div>

<div class="field">
<label>Correo electrónico <span class="edit" onclick="editar('correo')">✏️</span></label>
<input id="correo" value="{{correo}}" readonly>
</div>

<div class="field">
<label>Teléfono <span class="edit" onclick="editar('telefono')">✏️</span></label>
<input id="telefono" value="{{telefono}}" readonly>
</div>

<div class="field">
<label>Dirección <span class="edit" onclick="editar('direccion')">✏️</span></label>
<input id="direccion" value="{{direccion}}" readonly>
</div>

</div>

</div>

<!-- REPORTE -->

<div class="card">

<h3>Reporte de ejecución</h3>

<form method="post" action="/guardar">

<input type="hidden" name="contrato" value="{{contrato}}">

<label>Porcentaje de ejecución técnica actual</label>

<input name="porcentaje" placeholder="Ej: 75.50 o 75,50">

<label>Observaciones</label>

<textarea name="observaciones"></textarea>

<button>Guardar reporte</button>

</form>

</div>

{% endif %}

</div>

</body>

</html>
